name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Package DMG
        run: VERSION="${GITHUB_REF_NAME#v}" ./scripts/package.sh

      # Created as a draft: review the generated notes, then publish from the
      # Releases page. Release assets are permanent and don't count against
      # the Actions artifact storage quota.
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/AegisMac-*.dmg \
            --title "AegisMac $GITHUB_REF_NAME" \
            --generate-notes \
            --draft
